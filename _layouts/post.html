---
layout: default
---
<!-- Este es el contenedor principal del artículo -->
<article class="blog-section" style="max-width: 850px; margin: 0 auto; padding-top: 40px;">
  
  <!-- Cabecera del post: Título, Categoría y Fecha -->
  <header style="margin-bottom: 60px; text-align: left;">
    <div class="art-meta">
      <span class="art-cat" style="color: var(--accent); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;">
        {{ page.categories | join: ", " }}
      </span>
      <span class="art-date" style="margin-left: 15px; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);">
        {{ page.date | date: "%d %b %Y" }}
      </span>
    </div>
    <h1 class="hero-title" style="font-size: 3.5rem; margin-top: 20px; line-height: 1;">{{ page.title }}</h1>
  </header>

  <!-- El contenido del artículo que viene del archivo .md -->
  <div class="art-body">
    {{ content }}
  </div>

  <!-- Pie del artículo con el botón de soporte -->
  <footer style="margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--border);">
    {% include buymeacoffee.html %}
  </footer>

</article>
